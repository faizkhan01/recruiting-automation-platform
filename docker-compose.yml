services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: recruiting-automation-platform-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      network: host
    network_mode: host
    env_file: .env
    environment:
      MONGODB_URI: mongodb://127.0.0.1:27018/recruiting_automation
      REDIS_URL: redis://127.0.0.1:6380
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: recruiting-automation-platform-api
    network_mode: host
    command: npm run start:worker -w @recruit/api
    env_file: .env
    environment:
      MONGODB_URI: mongodb://127.0.0.1:27018/recruiting_automation
      REDIS_URL: redis://127.0.0.1:6380
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      network: host
    ports:
      - "5173:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api

volumes:
  mongo-data:
  redis-data:
